<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Proyecto - Poza Studios</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="project-page">
    <a class="project-back" href="index.html#slider">&larr; Volver al inicio</a>

    <section class="project-hero">
      <p class="project-kicker" id="project-kicker">Proyecto</p>
      <h1 class="project-title" id="project-title">Titulo</h1>
      <p class="project-summary" id="project-summary">Descripcion del proyecto.</p>
      <a class="btn-primary" id="project-cta" href="#"><span>Accion principal</span></a>
    </section>

    <section class="project-detail-grid">
      <article class="project-detail-card">
        <h2>Resumen</h2>
        <p id="project-overview">Aqui puedes incluir la historia, objetivo y propuesta del proyecto.</p>
      </article>

      <article class="project-detail-card">
        <h2>Caracteristicas clave</h2>
        <ul id="project-features"></ul>
      </article>

      <article class="project-detail-card">
        <h2>Tecnologias</h2>
        <ul id="project-tech"></ul>
      </article>

      <article class="project-detail-card">
        <h2>Estado</h2>
        <p id="project-status">En desarrollo.</p>
      </article>
    </section>
  </main>

  <script src="project.js"></script>
</body>
</html>
